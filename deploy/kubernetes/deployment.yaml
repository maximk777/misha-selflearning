apiVersion: apps/v1
kind: Deployment
metadata:
  name: task-service
  namespace: misha-course
spec:
  replicas: 2
  strategy: { type: RollingUpdate, rollingUpdate: { maxUnavailable: 0, maxSurge: 1 } }
  selector: { matchLabels: { app: task-service } }
  template:
    metadata: { labels: { app: task-service } }
    spec:
      containers:
        - name: app
          image: example/task-service:replace-me
          ports: [{ containerPort: 8080 }]
          envFrom: [{ configMapRef: { name: task-service-config } }]
          resources: { requests: { cpu: 100m, memory: 64Mi }, limits: { cpu: 500m, memory: 128Mi } }
          readinessProbe: { httpGet: { path: /healthz, port: 8080 }, initialDelaySeconds: 2 }
          livenessProbe: { httpGet: { path: /healthz, port: 8080 }, initialDelaySeconds: 5 }
