events {}
http {
  upstream task_service {
    # Compose must expose these DNS names; round-robin is default.
    server app-1:8080 weight=1;
    server app-2:8080 weight=1;
    # Alternative: least_conn; sticky requires an appropriate Nginx module.
  }
  server {
    listen 80;
    location /healthz { proxy_pass http://task_service/healthz; }
    location / {
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Request-ID $request_id;
      proxy_connect_timeout 2s; proxy_read_timeout 10s; proxy_send_timeout 10s;
      proxy_next_upstream error timeout http_502 http_503;
      proxy_pass http://task_service;
    }
  }
}
